name: Build Marker

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (ej. 1.2.3). Vacío = git describe."
        required: false
        type: string
  push:
    branches: [main]
    tags: ["v*"]
    paths-ignore:
      - "**.md"
      - ".gitignore"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            V="${{ inputs.version }}"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            V="${GITHUB_REF#refs/tags/v}"
          else
            V="$(git describe --tags --always --dirty 2>/dev/null || echo dev)"
          fi
          echo "marketing=$V" >> "$GITHUB_OUTPUT"
          echo "build=$GITHUB_RUN_NUMBER" >> "$GITHUB_OUTPUT"
          echo "Building Marker $V (build $GITHUB_RUN_NUMBER)"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Stamp version into project.yml
        run: |
          sed -i '' \
            -e "s/CFBundleVersion: \"[^\"]*\"/CFBundleVersion: \"${{ steps.version.outputs.build }}\"/" \
            -e "s/CFBundleShortVersionString: \"[^\"]*\"/CFBundleShortVersionString: \"${{ steps.version.outputs.marketing }}\"/" \
            project.yml
          grep -E "CFBundleVersion|CFBundleShortVersionString" project.yml

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (Release, ad-hoc signed)
        run: |
          set -o pipefail
          xcodebuild \
            -project Marker.xcodeproj \
            -scheme Marker \
            -configuration Release \
            -derivedDataPath build \
            ONLY_ACTIVE_ARCH=NO \
            build

      - name: Verify .app and signature
        run: |
          APP="build/Build/Products/Release/Marker.app"
          if [ ! -d "$APP" ]; then
            echo "Marker.app no se generó en $APP" >&2
            ls -la build/Build/Products/Release/ || true
            exit 1
          fi
          codesign --display --verbose=2 "$APP" || true
          /usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$APP/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$APP/Contents/Info.plist"

      - name: Package .app as Marker.zip (fixed name for stable link)
        run: |
          APP="build/Build/Products/Release/Marker.app"
          ditto -c -k --sequesterRsrc --keepParent "$APP" "Marker.zip"
          ls -lh Marker.zip

      - name: Upload artifact (versioned, for debugging)
        uses: actions/upload-artifact@v4
        with:
          name: Marker-${{ steps.version.outputs.marketing }}
          path: Marker.zip
          retention-days: 14

      - name: Publish or refresh Release (link estable)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF_NAME}"
            TITLE="Marker ${{ steps.version.outputs.marketing }}"
          else
            TAG="build-${GITHUB_RUN_NUMBER}"
            TITLE="Marker ${{ steps.version.outputs.marketing }} (build ${GITHUB_RUN_NUMBER})"
          fi
          # Idempotente: si el tag ya existe (re-run), borramos y recreamos.
          gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true
          gh release create "$TAG" "Marker.zip" \
            --title "$TITLE" \
            --latest \
            --generate-notes
          echo "::notice title=Release publicado::https://github.com/${GITHUB_REPOSITORY}/releases/latest"
