name: Build Marker

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (ej. 1.2.3). Vacío = git describe."
        required: false
        type: string
  push:
    branches: [main]
    tags: ["v*"]
    paths-ignore:
      - "**.md"
      - ".gitignore"
      - "LICENSE"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/dependabot.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            V="${{ inputs.version }}"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            V="${GITHUB_REF#refs/tags/v}"
          else
            V="$(git describe --tags --always --dirty 2>/dev/null || echo dev)"
          fi
          echo "marketing=$V" >> "$GITHUB_OUTPUT"
          echo "build=$GITHUB_RUN_NUMBER" >> "$GITHUB_OUTPUT"
          echo "Building Marker $V (build $GITHUB_RUN_NUMBER)"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Stamp version into project.yml
        run: |
          sed -i '' \
            -e "s/CFBundleVersion: \"[^\"]*\"/CFBundleVersion: \"${{ steps.version.outputs.build }}\"/" \
            -e "s/CFBundleShortVersionString: \"[^\"]*\"/CFBundleShortVersionString: \"${{ steps.version.outputs.marketing }}\"/" \
            project.yml
          grep -E "CFBundleVersion|CFBundleShortVersionString" project.yml

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (Release, ad-hoc signed)
        run: |
          set -o pipefail
          xcodebuild \
            -project Marker.xcodeproj \
            -scheme Marker \
            -configuration Release \
            -derivedDataPath build \
            ONLY_ACTIVE_ARCH=NO \
            build

      - name: Verify .app and signature
        run: |
          APP="build/Build/Products/Release/Marker.app"
          if [ ! -d "$APP" ]; then
            echo "Marker.app no se generó en $APP" >&2
            ls -la build/Build/Products/Release/ || true
            exit 1
          fi
          codesign --display --verbose=2 "$APP" || true
          /usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$APP/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$APP/Contents/Info.plist"

      - name: Package .app as Marker.zip (fixed name for stable link)
        run: |
          APP="build/Build/Products/Release/Marker.app"
          ditto -c -k --sequesterRsrc --keepParent "$APP" "Marker.zip"
          ls -lh Marker.zip

      - name: Upload artifact (versioned, for debugging)
        uses: actions/upload-artifact@v4
        with:
          name: Marker-${{ steps.version.outputs.marketing }}
          path: Marker.zip
          retention-days: 14

      - name: Resolve tag and download URL for appcast
        id: release_meta
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="build-${GITHUB_RUN_NUMBER}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "download_url=https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/Marker.zip" >> "$GITHUB_OUTPUT"

      - name: Sign Marker.zip and generate appcast.xml
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          MARKER_ZIP: Marker.zip
          MARKER_VERSION: ${{ steps.version.outputs.marketing }}
          MARKER_BUILD: ${{ steps.version.outputs.build }}
          MARKER_DOWNLOAD_URL: ${{ steps.release_meta.outputs.download_url }}
          APPCAST_PATH: appcast.xml
        run: |
          if [ -z "${SPARKLE_PRIVATE_KEY}" ]; then
            echo "::error::Falta el secret SPARKLE_PRIVATE_KEY. Anadelo en Settings > Secrets and variables > Actions."
            exit 1
          fi
          # macos-15 trae Python 3.13 con PEP 668 activo, que bloquea
          # pip install fuera de un venv. El runner es efimero, asi que
          # --break-system-packages es la via mas simple.
          python3 -m pip install --quiet --break-system-packages --upgrade pip
          python3 -m pip install --quiet --break-system-packages -r scripts/requirements.txt
          python3 scripts/sign_and_appcast.py
          echo "---appcast.xml---"
          cat appcast.xml

      - name: Publish or refresh Release (link estable)
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release_meta.outputs.tag }}
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TITLE="Marker ${{ steps.version.outputs.marketing }}"
          else
            TITLE="Marker ${{ steps.version.outputs.marketing }} (build ${GITHUB_RUN_NUMBER})"
          fi
          # Idempotente: si el tag ya existe (re-run), borramos y recreamos.
          gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true
          gh release create "$TAG" "Marker.zip" "appcast.xml" \
            --title "$TITLE" \
            --latest \
            --generate-notes
          echo "::notice title=Release publicado::https://github.com/${GITHUB_REPOSITORY}/releases/latest"
